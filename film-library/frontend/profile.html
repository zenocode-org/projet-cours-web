<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Library - Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100">
  <nav class="bg-slate-800 border-b border-slate-700 px-4 py-3 flex items-center justify-between">
    <a href="dashboard.html" class="text-xl font-bold text-amber-400">Film Library</a>
    <a href="dashboard.html" class="text-slate-300 hover:text-white">← Back</a>
  </nav>

  <main class="p-4 max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-6">Profile settings</h1>
    <form id="profile-form" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-400 mb-1">Email</label>
        <input type="email" id="email" disabled class="w-full px-4 py-2 rounded bg-slate-800 border border-slate-600 text-slate-400 cursor-not-allowed">
      </div>
      <div>
        <label for="display_name" class="block text-sm font-medium text-slate-300 mb-1">Display name</label>
        <input type="text" id="display_name" class="w-full px-4 py-2 rounded bg-slate-800 border border-slate-600 text-white focus:border-amber-500 outline-none">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-300 mb-1">New password (leave blank to keep)</label>
        <input type="password" id="password" minlength="6" placeholder="••••••••"
          class="w-full px-4 py-2 rounded bg-slate-800 border border-slate-600 text-white focus:border-amber-500 outline-none placeholder-slate-500">
      </div>
      <p id="message" class="text-emerald-400 text-sm hidden"></p>
      <p id="error" class="text-red-400 text-sm hidden"></p>
      <button type="submit" class="w-full py-2 rounded bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold">
        Save
      </button>
    </form>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script>
    checkAuth().then(user => {
      if (!user) return;
      profile.load();
    });
  </script>
</body>
</html>
