<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film Library - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <h1 class="text-3xl font-bold text-amber-400 text-center mb-8">Film Library</h1>
    <form id="login-form" class="bg-slate-800 rounded-lg shadow-xl p-6 space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Email</label>
        <input type="email" id="email" name="email" required
          class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-2 rounded bg-slate-700 text-white border border-slate-600 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none">
      </div>
      <p id="error" class="text-red-400 text-sm hidden"></p>
      <button type="submit" class="w-full py-2 rounded bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold transition">
        Login
      </button>
    </form>
    <p class="text-center text-slate-400 mt-4">
      Don't have an account? <a href="register.html" class="text-amber-400 hover:underline">Register</a>
    </p>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.classList.add('hidden');
      const res = await api.post('/api/auth/login.php', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      if (res.ok) {
        window.location.href = 'dashboard.html';
      } else {
        const data = await res.json();
        errEl.textContent = data.error || 'Login failed';
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
