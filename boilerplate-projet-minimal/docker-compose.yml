services:
  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./frontend:/var/www/html/frontend
    environment:
      DB_HOST: postgres
      DB_NAME: ${DB_NAME:-gabarit}
      DB_USER: ${DB_USER:-gabarit_user}
      DB_PASSWORD: ${DB_PASSWORD:-gabarit_pass}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-gabarit}
      POSTGRES_USER: ${DB_USER:-gabarit_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gabarit_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gabarit_user} -d ${DB_NAME:-gabarit}"]
      interval: 2s
      timeout: 5s
      retries: 10

  # Interface web pour explorer PostgreSQL (léger, une seule page).
  # phpMyAdmin est prévu pour MySQL/MariaDB, pas pour PostgreSQL — voir README.
  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
